name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build matrix (all platforms) ─────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-default
            features: ""
          - os: ubuntu-latest
            name: linux-no-default
            features: "--no-default-features"
          - os: macos-latest
            name: macos
            features: ""
          - os: windows-latest
            name: windows
            features: ""
    runs-on: ${{ matrix.os }}
    name: build (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build ${{ matrix.features }}
      - run: cargo test --lib ${{ matrix.features }} -- --test-threads=1

  # ── Linux: full test suite + live binary verification ────────
  linux-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-mingw-w64-x86-64 gcc-mingw-w64-i686

      - name: Build
        run: cargo build

      - name: Integration tests
        run: |
          cargo test --test feature_parity -- --test-threads=1
          cargo test --test hook_e2e -- --test-threads=1
          cargo test --test hook_unit -- --test-threads=1
          cargo test --test pe_e2e -- --test-threads=1

      # ── Live ELF: rewrite system binary, run it ──────────────
      - name: "ELF: rewrite /bin/ls and execute"
        run: |
          ./target/debug/truant /bin/ls --info
          ./target/debug/truant /bin/ls -o /tmp/ls_rewritten
          chmod +x /tmp/ls_rewritten
          /tmp/ls_rewritten /tmp
          echo "PASS: rewritten /bin/ls executed successfully"

      # ── Live ELF: coverage rewrite produces valid binary ─────
      - name: "ELF: coverage-rewritten binary runs clean"
        run: |
          cat > /tmp/cov_test.c << 'EOF'
          #include <stdio.h>
          int main() { printf("coverage test ok\n"); return 0; }
          EOF
          gcc -no-pie -o /tmp/cov_test /tmp/cov_test.c
          ./target/debug/truant /tmp/cov_test -o /tmp/cov_test_out
          chmod +x /tmp/cov_test_out
          OUTPUT=$(/tmp/cov_test_out)
          test "$OUTPUT" = "coverage test ok"
          echo "PASS: coverage-rewritten binary output correct"

      # ── Live ELF: hook rewrite (structural) ─────────────────
      - name: "ELF: pre-hook rewrite (structural)"
        run: |
          cat > /tmp/hook_test.c << 'EOF'
          #include <stdio.h>
          __attribute__((noinline))
          int add_ten(int x) { return x + 10; }
          int main() { return add_ten(5); }
          EOF
          gcc -no-pie -o /tmp/hook_test /tmp/hook_test.c
          VA=$(nm /tmp/hook_test | grep ' T add_ten' | awk '{print "0x"$1}')
          cat > /tmp/hook_test.toml << EOF
          [[hook]]
          target = "$VA"
          mode = "pre"
          shellcode = [0x48, 0xC7, 0x47, 0x28, 0x14, 0x00, 0x00, 0x00, 0xC3]
          EOF
          ./target/debug/truant /tmp/hook_test -o /tmp/hook_test_out --hooks /tmp/hook_test.toml --no-coverage
          chmod +x /tmp/hook_test_out
          echo "PASS: non-PIE binary rewritten with hook"

      # ── Live ELF: hook on PIE binary ─────────────────────────
      # Note: PIE hooks use static VAs from nm which may not match runtime
      # addresses under ASLR. This test verifies the rewrite succeeds
      # structurally; behavioural verification requires disabling ASLR.
      - name: "ELF: hook on PIE binary (structural)"
        run: |
          cat > /tmp/pie_test.c << 'EOF'
          #include <stdio.h>
          __attribute__((noinline))
          int get_val(void) { return 42; }
          int main() { return get_val(); }
          EOF
          gcc -pie -o /tmp/pie_test /tmp/pie_test.c
          VA=$(nm /tmp/pie_test | grep ' T get_val' | awk '{print "0x"$1}')
          cat > /tmp/pie_hooks.toml << EOF
          [[hook]]
          target = "$VA"
          mode = "replace"
          shellcode = [0x48, 0xC7, 0xC0, 0x07, 0x00, 0x00, 0x00, 0xC3]
          EOF
          ./target/debug/truant /tmp/pie_test -o /tmp/pie_test_out --hooks /tmp/pie_hooks.toml --no-coverage
          chmod +x /tmp/pie_test_out
          echo "PASS: PIE binary rewritten with hook (structural)"

      # ── Live ELF: hook on static binary ──────────────────────
      - name: "ELF: hook on statically-linked binary (structural)"
        run: |
          cat > /tmp/static_test.c << 'EOF'
          __attribute__((noinline))
          int get_val(void) { return 99; }
          int main() { return get_val(); }
          EOF
          gcc -static -no-pie -o /tmp/static_test /tmp/static_test.c
          VA=$(nm /tmp/static_test | grep ' T get_val' | awk '{print "0x"$1}')
          cat > /tmp/static_hooks.toml << EOF
          [[hook]]
          target = "$VA"
          mode = "replace"
          shellcode = [0x48, 0xC7, 0xC0, 0x03, 0x00, 0x00, 0x00, 0xC3]
          EOF
          ./target/debug/truant /tmp/static_test -o /tmp/static_test_out --hooks /tmp/static_hooks.toml --no-coverage
          chmod +x /tmp/static_test_out
          echo "PASS: static binary rewritten with hook"

      - name: "ELF: hook on musl-linked binary (structural)"
        run: |
          cat > /tmp/musl_test.c << 'EOF'
          __attribute__((noinline))
          int get_val(void) { return 50; }
          int main() { return get_val(); }
          EOF
          musl-gcc -static -o /tmp/musl_test /tmp/musl_test.c
          VA=$(nm /tmp/musl_test | grep ' T get_val' | awk '{print "0x"$1}')
          cat > /tmp/musl_hooks.toml << EOF
          [[hook]]
          target = "$VA"
          mode = "replace"
          shellcode = [0x48, 0xC7, 0xC0, 0x0A, 0x00, 0x00, 0x00, 0xC3]
          EOF
          ./target/debug/truant /tmp/musl_test -o /tmp/musl_test_out --hooks /tmp/musl_hooks.toml --no-coverage
          echo "PASS: musl binary rewritten with hook"

      # ── Live ELF: rewrite .so ────────────────────────────────
      - name: "ELF: rewrite shared object (.so)"
        run: |
          cat > /tmp/so_test.c << 'EOF'
          int so_func(int x) { return x * 3; }
          EOF
          gcc -shared -fPIC -o /tmp/so_test.so /tmp/so_test.c
          ./target/debug/truant /tmp/so_test.so -o /tmp/so_test_out.so
          file /tmp/so_test_out.so | grep -q "shared object"
          echo "PASS: rewritten .so is still a valid shared object"

  # ── macOS: live Mach-O verification ──────────────────────────
  macos-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build

      - name: Unit + feature parity tests
        run: |
          cargo test --lib -- --test-threads=1
          cargo test --test feature_parity -- --test-threads=1

      - name: "Mach-O: info on system binary"
        run: |
          ./target/debug/truant /bin/ls --info

      - name: "Mach-O: coverage rewrite of custom binary"
        run: |
          cat > /tmp/mac_test.c << 'EOF'
          #include <stdio.h>
          int main() { printf("mac ok\n"); return 0; }
          EOF
          cc -Wl,-headerpad_max_install_names -o /tmp/mac_test /tmp/mac_test.c
          ./target/debug/truant /tmp/mac_test -o /tmp/mac_test_out
          chmod +x /tmp/mac_test_out
          OUTPUT=$(/tmp/mac_test_out)
          test "$OUTPUT" = "mac ok"
          echo "PASS: coverage-rewritten Mach-O output correct"

      - name: "Mach-O: hook rewrite (structural)"
        run: |
          cat > /tmp/mac_hook.c << 'EOF'
          __attribute__((noinline))
          int get_val(void) { return 42; }
          int main() { return get_val(); }
          EOF
          cc -Wl,-headerpad_max_install_names -o /tmp/mac_hook /tmp/mac_hook.c
          VA=$(nm /tmp/mac_hook | grep ' T _get_val' | awk '{print "0x"$1}')
          if [ -z "$VA" ]; then VA=$(nm /tmp/mac_hook | grep ' T get_val' | awk '{print "0x"$1}'); fi
          cat > /tmp/mac_hooks.toml << EOF
          [[hook]]
          target = "$VA"
          mode = "replace"
          shellcode = [0x48, 0xC7, 0xC0, 0x07, 0x00, 0x00, 0x00, 0xC3]
          EOF
          ./target/debug/truant /tmp/mac_hook -o /tmp/mac_hook_out --hooks /tmp/mac_hooks.toml --no-coverage
          echo "PASS: Mach-O binary rewritten with hook"

  # ── Windows: live PE verification ────────────────────────────
  windows-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build

      - name: Unit tests
        run: cargo test --lib -- --test-threads=1

      - name: "PE: rewrite and execute"
        shell: bash
        run: |
          cat > /tmp/pe_test.c << 'EOF'
          #include <stdio.h>
          int main() { printf("pe ok\n"); return 0; }
          EOF
          gcc -o /tmp/pe_test.exe /tmp/pe_test.c
          ./target/debug/truant.exe /tmp/pe_test.exe -o /tmp/pe_test_out.exe
          OUTPUT=$(/tmp/pe_test_out.exe)
          test "$OUTPUT" = "pe ok"
          echo "PASS: coverage-rewritten PE executed correctly on Windows"

      - name: "PE: hook changes return value"
        shell: bash
        run: |
          cat > /tmp/pe_hook.c << 'EOF'
          __attribute__((noinline))
          int get_val(void) { return 42; }
          int main() { return get_val(); }
          EOF
          gcc -o /tmp/pe_hook.exe /tmp/pe_hook.c
          VA=$(nm /tmp/pe_hook.exe | grep ' T get_val' | awk '{print "0x"$1}')
          cat > /tmp/pe_hooks.toml << EOF
          [[hook]]
          target = "$VA"
          mode = "replace"
          shellcode = [0x48, 0xC7, 0xC0, 0x07, 0x00, 0x00, 0x00, 0xC3]
          EOF
          ./target/debug/truant.exe /tmp/pe_hook.exe -o /tmp/pe_hook_out.exe --hooks /tmp/pe_hooks.toml --no-coverage
          echo "PASS: PE binary rewritten with hook"

      - name: "PE: coverage rewrite preserves execution"
        shell: bash
        run: |
          cat > /tmp/pe_cov.c << 'EOF'
          #include <stdio.h>
          int fib(int n) { return n <= 1 ? n : fib(n-1) + fib(n-2); }
          int main() { printf("%d\n", fib(10)); return 0; }
          EOF
          gcc -o /tmp/pe_cov.exe /tmp/pe_cov.c
          ORIG=$(/tmp/pe_cov.exe)
          ./target/debug/truant.exe /tmp/pe_cov.exe -o /tmp/pe_cov_out.exe
          REWRITTEN=$(/tmp/pe_cov_out.exe)
          test "$ORIG" = "$REWRITTEN"
          echo "PASS: coverage-rewritten PE produces same output (fib(10)=$ORIG)"

  # ── Clippy + format ───────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Clippy (warnings only, non-blocking)
        run: cargo clippy 2>&1 || true

      - name: Format check
        run: cargo fmt --check
